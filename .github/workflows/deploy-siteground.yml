name: Deploy Astro to SiteGround

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: siteground-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify required site surface in build output
        run: node scripts/verify-site-surface.mjs

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy dist/ via lftp mirror
        env:
          FTP_HOST: ftp.sfrattosicuro.it
          FTP_USER: ghdeploy@sfrattosicuro.it
          FTP_PASS: ${{ secrets.SG_FTP_PASSWORD }}
          FTP_TARGET_DIR: /sfrattosicuro.it/public_html/
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" <<EOF
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 20
          set net:reconnect-interval-base 5
          set xfer:clobber true
          mkdir -p $FTP_TARGET_DIR
          mirror -R --verbose --delete --parallel=2 --exclude-glob .git* --exclude-glob node_modules --exclude-glob .github dist/ $FTP_TARGET_DIR
          bye
          EOF
