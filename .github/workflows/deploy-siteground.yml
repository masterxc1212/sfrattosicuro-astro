name: Deploy Astro to SiteGround

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: siteground-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.sfrattosicuro.it
          username: ghdeploy@sfrattosicuro.it
          password: ${{ secrets.SG_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./dist/
          server-dir: /sfrattosicuro.it/public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Cleanup old dist_publish directory
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.sfrattosicuro.it
          username: ghdeploy@sfrattosicuro.it
          password: ${{ secrets.SG_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          state-name: .ftp-state-cleanup
          script: |
            cd /sfrattosicuro.it/public_html
            rm -rf dist_publish
